spring:
  application:
    name: code-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_agent
    username: root
    password: 123456
  profiles:
    active: local  #激活本地配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600  # redis的过期时间，单位：秒
server:
  port: 8127
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hechang.codeagent.controller
# knife4j config, enhance config, optional config
knife4j:
  enable: true
  setting:
    language: zh_cn